name: Atyrau Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atyrau-media-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
        run: |
          mkdir -p state
          touch state/SENT_CANONICAL.txt
          python atyrau_monitor.py --once

      - name: Commit monitor state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f state/monitor_state.json ]; then
            git add state/monitor_state.json
          fi
          if [ -f state/SENT_CANONICAL.txt ]; then
            git add state/SENT_CANONICAL.txt
          fi

          if git diff --cached --quiet; then
            echo "No monitor state changes to commit."
            exit 0
          fi

          git commit -m "chore: update monitor state [skip ci]"
          git pull --rebase --autostash origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
.github
└── workflows
    └── monitor.yml
