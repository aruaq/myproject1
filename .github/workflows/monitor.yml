name: Atyrau Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      send_test:
        description: "Send Telegram test message before monitor cycle"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "atyrau_monitor.py"
      - ".github/workflows/monitor.yml"
      - ".gitignore"

permissions:
  contents: write

concurrency:
  group: atyrau-media-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
          SEND_TEST_INPUT: ${{ github.event.inputs.send_test || 'false' }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          mkdir -p state
          touch state/SENT_CANONICAL.txt

          args=(--once)
          send_test="$SEND_TEST_INPUT"
          if [ "$GITHUB_EVENT_NAME" = "push" ] && printf '%s' "$HEAD_COMMIT_MESSAGE" | grep -q '\[send-test\]'; then
            send_test="true"
          fi
          if [ "$send_test" = "true" ]; then
            args+=(--send-test)
          fi

          echo "GitHub Actions run started"
          python atyrau_monitor.py "${args[@]}"

      - name: Commit monitor state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f state/monitor_state.json state/SENT_CANONICAL.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No monitor state changes to commit."
            exit 0
          fi

          git commit -m "chore: update monitor state [skip ci]"
          git pull --rebase --autostash origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
